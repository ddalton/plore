# plore stack for the c1 kind cluster (namespace: plore).
# c1 differences vs c2:
#   - No `taalas` namespace: taalas-proxy runs in-namespace (image loaded via `kind load`).
#   - awc-core gateway host `console.awc-core.poc.internal` -> istio-ingress ClusterIP 10.96.59.175.
#   - plore image is the local arm64 build loaded via `kind load` (imagePullPolicy: Never).
# ConfigMaps `litellm-config` and `specs-bundle`, and the `plore-awc-creds` secret, are created
# out-of-band (see deploy/c1/deploy.sh). Storage is ephemeral (emptyDir) — this is a test cluster.
apiVersion: v1
kind: Namespace
metadata:
  name: plore
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgvector
  namespace: plore
spec:
  replicas: 1
  selector: { matchLabels: { app: pgvector } }
  template:
    metadata: { labels: { app: pgvector } }
    spec:
      containers:
        - name: pgvector
          image: pgvector/pgvector:pg16
          env:
            - { name: POSTGRES_USER, value: plore }
            - { name: POSTGRES_PASSWORD, value: plore }
            - { name: POSTGRES_DB, value: maui_registry }
          ports: [{ containerPort: 5432 }]
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: pgvector, namespace: plore }
spec:
  selector: { app: pgvector }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: plore
spec:
  replicas: 1
  selector: { matchLabels: { app: ollama } }
  template:
    metadata: { labels: { app: ollama } }
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports: [{ containerPort: 11434 }]
          volumeMounts: [{ name: models, mountPath: /root/.ollama }]
      volumes: [{ name: models, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: ollama, namespace: plore }
spec:
  selector: { app: ollama }
  ports: [{ port: 11434, targetPort: 11434 }]
---
# Pulls the 768-dim embedding model (EmbeddingGemma) into Ollama once it is reachable.
apiVersion: batch/v1
kind: Job
metadata: { name: ollama-pull, namespace: plore }
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: ollama/ollama:latest
          env: [{ name: OLLAMA_HOST, value: "http://ollama:11434" }]
          command: ["sh", "-c"]
          args:
            - |
              until ollama list >/dev/null 2>&1; do echo "waiting for ollama..."; sleep 3; done
              ollama pull embeddinggemma
---
# Chat upstream for litellm (llama3.1-8B via taalas). c1 has no `taalas` namespace, so the
# proxy runs here; image is loaded into the cluster with `kind load docker-image`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taalas-proxy
  namespace: plore
spec:
  replicas: 1
  selector: { matchLabels: { app: taalas-proxy } }
  template:
    metadata: { labels: { app: taalas-proxy } }
    spec:
      containers:
        - name: taalas-proxy
          image: dilipdalton/taalas-proxy:0.1.0
          imagePullPolicy: Never
          env:
            - { name: PORT, value: "3000" }
            - { name: PROXY_API_KEY, value: "sk-taalas-local" }
          ports: [{ containerPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata: { name: taalas-proxy, namespace: plore }
spec:
  selector: { app: taalas-proxy }
  ports: [{ port: 3000, targetPort: 3000 }]
---
# Object storage for artifact offload (downloaded bundles, etc.).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: plore
spec:
  replicas: 1
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - { name: MINIO_ROOT_USER, value: "plore" }
            - { name: MINIO_ROOT_PASSWORD, value: "plore-secret" }
          ports:
            - { containerPort: 9000 }
            - { containerPort: 9001 }
          volumeMounts: [{ name: data, mountPath: /data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: minio, namespace: plore }
spec:
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000 }
    - { name: console, port: 9001, targetPort: 9001 }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: plore
spec:
  replicas: 1
  selector: { matchLabels: { app: litellm } }
  template:
    metadata: { labels: { app: litellm } }
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          env:
            - { name: TAALAS_PROXY_BASE, value: "http://taalas-proxy:3000/v1" }
            - { name: TAALAS_PROXY_KEY, value: "sk-taalas-local" }
            - { name: EMBED_BASE, value: "http://ollama:11434/v1" }
            - { name: LITELLM_MASTER_KEY, value: "sk-plore-local" }
          ports: [{ containerPort: 4000 }]
          volumeMounts:
            - { name: cfg, mountPath: /app/config.yaml, subPath: config.yaml }
      volumes:
        - name: cfg
          configMap: { name: litellm-config }
---
apiVersion: v1
kind: Service
metadata: { name: litellm, namespace: plore }
spec:
  selector: { app: litellm }
  ports: [{ port: 4000, targetPort: 4000 }]
---
# One-shot ingestion of the OpenAPI specs (from the mounted bundle) into pgvector.
apiVersion: batch/v1
kind: Job
metadata: { name: plore-ingest, namespace: plore }
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ingest
          image: plore:0.1.0
          imagePullPolicy: Never
          command: ["plore-ingest", "--bundle", "/specs/specs-bundle.json"]
          env:
            - { name: DATABASE_URL, value: "postgresql://plore:plore@pgvector:5432/maui_registry" }
            - { name: LITELLM_BASE_URL, value: "http://litellm:4000/v1" }
            - { name: LITELLM_API_KEY, value: "sk-plore-local" }
            # 8B LLM enrichment is unreliable; rely on the deterministic curated overlay.
            - { name: ENRICH_DESCRIPTIONS, value: "false" }
          volumeMounts: [{ name: specs, mountPath: /specs }]
      volumes:
        - name: specs
          configMap: { name: specs-bundle }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plore-ui
  namespace: plore
spec:
  replicas: 1
  selector: { matchLabels: { app: plore-ui } }
  template:
    metadata: { labels: { app: plore-ui } }
    spec:
      # CoreDNS doesn't resolve *.poc.internal; point the gateway host at the istio-ingress ClusterIP.
      hostAliases:
        - ip: "10.96.59.175"
          hostnames: ["console.awc-core.poc.internal"]
      containers:
        - name: ui
          image: plore:0.1.0
          imagePullPolicy: Never
          command: ["streamlit", "run", "ui/app.py",
                    "--server.address", "0.0.0.0", "--server.port", "8501",
                    "--server.headless", "true"]
          env:
            - { name: DATABASE_URL, value: "postgresql://plore:plore@pgvector:5432/maui_registry" }
            - { name: LITELLM_BASE_URL, value: "http://litellm:4000/v1" }
            - { name: LITELLM_API_KEY, value: "sk-plore-local" }
            # Real execution through the AWC gateway (Knox-authenticated).
            - { name: AWC_API_BASE, value: "https://console.awc-core.poc.internal" }
            - { name: AWC_API_VERIFY_TLS, value: "false" }
            - name: AWC_ACCESS_KEY_ID
              valueFrom: { secretKeyRef: { name: plore-awc-creds, key: client-id } }
            - name: AWC_ACCESS_KEY_SECRET
              valueFrom: { secretKeyRef: { name: plore-awc-creds, key: client-secret } }
            # Artifact offload to in-cluster MinIO.
            - { name: MINIO_ENDPOINT, value: "minio:9000" }
            - { name: MINIO_ACCESS_KEY, value: "plore" }
            - { name: MINIO_SECRET_KEY, value: "plore-secret" }
            - { name: MINIO_BUCKET, value: "plore-artifacts" }
          ports: [{ containerPort: 8501 }]
---
apiVersion: v1
kind: Service
metadata: { name: plore-ui, namespace: plore }
spec:
  selector: { app: plore-ui }
  ports: [{ port: 8501, targetPort: 8501 }]
