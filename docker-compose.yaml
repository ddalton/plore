# Local end-to-end stack for plore. Brings up the vector DB, embedder, LiteLLM
# gateway, the taalas chat proxy, and the LangGraph server.
#
#   docker compose up -d pgvector ollama taalas-proxy litellm
#   docker compose exec ollama ollama pull embeddinggemma   # first run only
#   SPECS_DIR=../awc-core/api DATABASE_URL=postgresql://plore:plore@localhost:5432/maui_registry \
#     LITELLM_BASE_URL=http://localhost:4000/v1 plore-ingest
#   plore-discovery "how do I list deployed clusters?"
services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: plore
      POSTGRES_PASSWORD: plore
      POSTGRES_DB: maui_registry
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plore -d maui_registry"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Embedder. Ollama (arm64-native, reliable) serving EmbeddingGemma (768-dim) — the same
  # model the clusters use, so behavior matches end to end.
  # First run: docker compose exec ollama ollama pull embeddinggemma
  ollama:
    image: ollama/ollama:latest
    volumes: ["ollama:/root/.ollama"]
    ports: ["11434:11434"]

  taalas-proxy:
    image: dilipdalton/taalas-proxy:0.1.0
    environment:
      PORT: "3000"
      PROXY_API_KEY: "sk-taalas-local"
    ports: ["3000:3000"]

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on: [taalas-proxy, ollama]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      TAALAS_PROXY_BASE: http://taalas-proxy:3000/v1
      TAALAS_PROXY_KEY: "sk-taalas-local"
      EMBED_BASE: http://ollama:11434/v1
      EMBED_MODEL_UPSTREAM: embeddinggemma
      LITELLM_MASTER_KEY: "sk-plore-local"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    ports: ["4000:4000"]

  agent:
    build: .
    depends_on: [litellm, pgvector]
    environment:
      DATABASE_URL: postgresql://plore:plore@pgvector:5432/maui_registry
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: "sk-plore-local"
    ports: ["2024:2024"]

  ui:
    build: .
    depends_on: [litellm, pgvector]
    command: ["streamlit", "run", "ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    environment:
      DATABASE_URL: postgresql://plore:plore@pgvector:5432/maui_registry
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: "sk-plore-local"
    ports: ["8501:8501"]

volumes:
  ollama:
