# LiteLLM gateway: one OpenAI-compatible surface for plore.
#  - chat  -> taalas-proxy (llama3.1-8B via chatjimmy)
#  - embed -> Ollama EmbeddingGemma (768-dim)
model_list:
  - model_name: taalas-llama
    litellm_params:
      model: openai/llama3.1-8B
      api_base: os.environ/TAALAS_PROXY_BASE
      api_key: os.environ/TAALAS_PROXY_KEY

  # Embedding alias 'embeddinggemma' (768-dim), served by Ollama in every environment.
  - model_name: embeddinggemma
    litellm_params:
      model: openai/embeddinggemma
      api_base: os.environ/EMBED_BASE
      api_key: "ollama"

litellm_settings:
  drop_params: true        # silently drop params the upstream can't use
  num_retries: 2

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
